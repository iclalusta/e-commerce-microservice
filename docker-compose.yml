version: '3.8'

services:
  # 1. API Gateway Service
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - AUTH_SERVICE_URI=http://auth-service:8081
      - USER_SERVICE_URI=http://user-service:8080
      - PRODUCT_SERVICE_URI=http://product-service:8083
      - CART_SERVICE_URI=http://cart-service:8084
      - ORDER_SERVICE_URI=http://order-service:8085
      - JWT_SECRET=supersecretjwtkey # WARNING: Use a more secure key in production!
    depends_on:
      - auth-service
      - user-service
#      - product-service
      - cart-service
      - order-service

  # 2. Authentication Service
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - AUTH_SERVICE_PORT=8081
      - AUTH_DB_HOST=auth-db
      - AUTH_DB_PORT=5432
      - AUTH_DB_USER=authuser
      - AUTH_DB_PASSWORD=authpassword
      - AUTH_DB_NAME=authdb
      - JWT_SECRET=supersecretjwtkey # WARNING: Must be the same as in api-gateway!
      - USER_SERVICE_URL=http://user-service:8080
    depends_on:
      - auth-db


  # 3. User Service
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      - USER_SERVICE_PORT=8080
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=userdb
      - AUTH_SERVICE_URL=http://auth-service:8081
    depends_on:
      - user-db
      - auth-service


#  # 4. Product Service (Enabled)
#  product-service:
#    build:
#      context: ./product-service # Assuming this directory exists
#      dockerfile: Dockerfile   # Assuming you create a Dockerfile here
#    ports:
#      - "8083:8083"
#    environment:
#      - PRODUCT_SERVICE_PORT=8083
#      - AUTH_SERVICE_URL=http://auth-service:8081
#      - DB_HOST=product-db
#      - DB_PORT=5432
#      - DB_USER=productuser
#      - DB_PASSWORD=productpassword
#      - DB_NAME=productdb
#    depends_on:
#      - auth-service
#      - product-db
#    networks:
#      - microservice_network

  # 5. Cart Service
  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - CART_SERVICE_PORT=8084
      - SPRING_DATA_MONGODB_URI=mongodb://cart-mongodb:27017/cartdb
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      - PRODUCT_SERVICE_URL=http://product-service:8083
      - AUTH_SERVICE_URL=http://auth-service:8081
    depends_on:
      - cart-mongodb
      - rabbitmq
      - auth-service
#      - product-service


  # 6. Order Service (Enabled)
  order-service:
    build:
      context: ./order-service # Assuming this directory exists
      dockerfile: Dockerfile  # Assuming you create a Dockerfile here
    ports:
      - "8085:8085"
    environment:
      - ORDER_SERVICE_PORT=8085
      - AUTH_SERVICE_URL=http://auth-service:8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/orderdb
      - SPRING_DATASOURCE_USERNAME=orderuser
      - SPRING_DATASOURCE_PASSWORD=orderpassword
    depends_on:
      - auth-service
      - order-db

  # 6. Order Service (Enabled)
  payment-service:
    build:
      context: ./payment-service # Assuming this directory exists
      dockerfile: Dockerfile  # Assuming you create a Dockerfile here
    ports:
      - "8086:8086"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - DB_URL=jdbc:mysql://payment-db:3306/paymentdb
      - DB_USERNAME=root
      - DB_PASSWORD=EInDcm29pE


  # Database Services
  auth-db:
    image: postgres:13
    environment:
      - POSTGRES_USER=authuser
      - POSTGRES_PASSWORD=authpassword
      - POSTGRES_DB=authdb
    volumes:
      - auth_db_data:/var/lib/postgresql/data


  user-db:
    image: postgres:13
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=userdb
    volumes:
      - user_db_data:/var/lib/postgresql/data


#  product-db:
#    image: postgres:13
#    environment:
#      - POSTGRES_USER=productuser
#      - POSTGRES_PASSWORD=productpassword
#      - POSTGRES_DB=productdb
#    volumes:
#      - product_db_data:/var/lib/postgresql/data
#    networks:
#      - microservice_network

  order-db:
    image: postgres:13
    environment:
      - POSTGRES_USER=orderuser
      - POSTGRES_PASSWORD=orderpassword
      - POSTGRES_DB=orderdb
    volumes:
      - order_db_data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  payment-db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=EInDcm29pE
      - MYSQL_DATABASE=paymentdb
      # If you want a non-root app user as well, uncomment the next two lines:
      # - MYSQL_USER=orderuser
      # - MYSQL_PASSWORD=orderpassword
    volumes:
      - payment_db_data:/var/lib/mysql
    ports:
      - "3308:3306"                   # hostPort:containerPort (optional)


  cart-mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - cart_mongodb_data:/data/db


  # Messaging Service
  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest


# Volumes and Network Definitions
volumes:
  auth_db_data:
  user_db_data:
  payment_db_data:
#  product_db_data:
  order_db_data:
  cart_mongodb_data:
